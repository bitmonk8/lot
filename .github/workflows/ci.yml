name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - run: cargo clippy --workspace --all-targets --features tokio -- -D warnings

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Enable unprivileged user namespaces
        run: |
          # AppArmor restriction may not exist on all kernels -- failure is acceptable.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          # Sysctl may not exist on kernels that always allow user namespaces.
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
      - name: Run tests with delegated cgroup
        run: |
          # Find the current cgroup (e.g., /system.slice/hosted-compute-agent.service)
          current_cg="/sys/fs/cgroup$(cat /proc/self/cgroup | grep '^0::' | cut -d: -f3)"
          parent_cg="$(dirname "$current_cg")"

          # Enable memory+pids controllers from root down to the parent.
          p="/sys/fs/cgroup"
          while [ "$p" != "$parent_cg" ] && [ "$p" != "/" ]; do
            if [ -f "$p/cgroup.subtree_control" ]; then
              echo '+memory +pids' | sudo tee "$p/cgroup.subtree_control" > /dev/null
            fi
            # Walk toward parent_cg by appending the next path component
            next="$(echo "$parent_cg" | sed "s|^$p/||" | cut -d/ -f1)"
            # Guard against infinite loop if sed/cut produce empty component
            if [ -z "$next" ]; then
              break
            fi
            p="$p/$next"
          done
          if [ -f "$parent_cg/cgroup.subtree_control" ]; then
            echo '+memory +pids' | sudo tee "$parent_cg/cgroup.subtree_control" > /dev/null
          fi

          # Create lot-test under the same parent as our current cgroup.
          # Layout:
          #   parent/
          #     hosted-compute-agent.service/   (current, being vacated)
          #     lot-test/                        subtree_control: +memory +pids
          #       runner/                        test process (leaf)
          #       lot-sandbox-*/                 CgroupGuard creates these
          cg="$parent_cg/lot-test"
          sudo mkdir -p "$cg/runner"
          sudo chown -R "$(id -u):$(id -g)" "$cg"
          echo '+memory +pids' > "$cg/cgroup.subtree_control"

          # Move ourselves into the runner leaf.
          echo $$ | sudo tee "$cg/runner/cgroup.procs"
          cargo test -p lot --features tokio -- --test-threads=1 --nocapture
      - name: Run lot-cli tests
        run: cargo test -p lot-cli

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - run: cargo test -p lot --features tokio -- --test-threads=1 --nocapture
      - name: Run lot-cli tests
        run: cargo test -p lot-cli

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Setup AppContainer prerequisites
        run: cargo run -p lot-cli -- setup --verbose
      - run: cargo test -p lot --features tokio -- --test-threads=1 --nocapture
      - name: Run lot-cli tests
        run: cargo test -p lot-cli

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - run: cargo build --workspace
